name: Deploy Web + Payment to Yandex Cloud

on:
  release:
    types: [created]
  workflow_dispatch:

# Required GitHub Secrets:
# ─────────────────────────────────────────────────────
# YC_SA_JSON_CREDENTIALS  — Yandex Cloud service account JSON key
# YC_FOLDER_ID            — Yandex Cloud folder ID
# YC_REGISTRY_ID          — Container Registry ID
# YC_SERVICE_ACCOUNT_ID   — Service account ID for VM
# YC_SUBNET_ID            — Subnet ID (ru-central1-d)
# YC_VM_NAME              — VM name (e.g. transapp-web)
# YC_VM_SSH               — Public SSH key for VM access
# YC_VM_USERNAME           — VM username (e.g. deploy)
# YC_VM_PUBLIC_IP         — Static public IP for the VM
# YC_CERT_ID              — Yandex Certificate Manager cert ID (for SSL)
# PG_USER                 — PostgreSQL username for payment-db
# PG_PASSWORD             — PostgreSQL password
# PG_NAME                 — PostgreSQL database name (e.g. payment_db)
# KAZNA_API_URL           — Kazna payment gateway URL
# KAZNA_SECRET_KEY        — Kazna API secret key
# KAZNA_TOKEN             — Kazna API token
# Data quality monitoring (ADR-012):
# TELEGRAM_BOT_TOKEN          — @transappmonitor_bot token from @BotFather
# TELEGRAM_ADMIN_CHAT_ID      — admin's personal Telegram chat_id (integer)
# FIREBASE_SERVER_ACCOUNT_JSON — full content of the service-account JSON
#                                (Firebase Console → Project Settings →
#                                Service Accounts → Generate new private key);
#                                baked into the payment-service image at build
#                                time as /run/secrets/firebase-server-account.json
# Web push (ADR-009, build-time only):
# FIREBASE_WEB_API_KEY / FIREBASE_WEB_APP_ID / FIREBASE_WEB_VAPID_KEY /
# FIREBASE_WEB_PROJECT_ID / FIREBASE_WEB_MESSAGING_SENDER_ID /
# FIREBASE_WEB_STORAGE_BUCKET
# StrongSwan VPN sidecar for TG egress (ADR-015):
# STRONGSWAN_EAP_USERNAME    — VPN account username (EAP-MSCHAPv2)
# STRONGSWAN_EAP_PASSWORD    — VPN account password

env:
  CR_REGISTRY: ${{ secrets.YC_REGISTRY_ID }}
  CR_REPO: transapp-web
  NGINX_IMAGE: cr.yandex/${{ secrets.YC_REGISTRY_ID }}/transapp-web:${{ github.sha }}-nginx
  PAYMENT_IMAGE: cr.yandex/${{ secrets.YC_REGISTRY_ID }}/transapp-web:${{ github.sha }}-payment
  VPN_IMAGE: cr.yandex/${{ secrets.YC_REGISTRY_ID }}/transapp-web:${{ github.sha }}-vpn

  # Passed to docker-compose.yc.yaml template
  PG_USER: ${{ secrets.PG_USER }}
  PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
  PG_NAME: ${{ secrets.PG_NAME }}
  KAZNA_API_URL: ${{ secrets.KAZNA_API_URL }}
  KAZNA_SECRET_KEY: ${{ secrets.KAZNA_SECRET_KEY }}
  KAZNA_TOKEN: ${{ secrets.KAZNA_TOKEN }}
  YC_CERT_ID: ${{ secrets.YC_CERT_ID }}
  # Data quality monitoring (ADR-012). Empty values are tolerated:
  # payment-bot exits gracefully when bot creds are unset, FCM degrades
  # silently when the service-account JSON build-arg is empty.
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
  # StrongSwan VPN sidecar (ADR-015). Without these, the vpn container
  # exits at startup and payment-bot starts without TG egress; admin
  # alerts will queue in the DB until the next deploy with valid creds.
  STRONGSWAN_EAP_USERNAME: ${{ secrets.STRONGSWAN_EAP_USERNAME }}
  STRONGSWAN_EAP_PASSWORD: ${{ secrets.STRONGSWAN_EAP_PASSWORD }}

jobs:
  build-nginx:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Yandex Cloud Container Registry
        uses: yc-actions/yc-cr-login@v2
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}

      - name: Build and push nginx image (includes Expo Web build)
        # Firebase Web push secrets are injected as build args. Three are
        # project-private (FIREBASE_WEB_API_KEY, _APP_ID, _VAPID_KEY),
        # three could be derived from google-services.json but are wired
        # through secrets for parity. If any secret is unset, the build
        # still succeeds — the web push pipeline degrades to no-op via
        # `isFirebaseWebConfigured()` and the banner stays hidden.
        run: |
          docker build \
            -f nginx/Dockerfile.prod \
            --build-arg FIREBASE_WEB_API_KEY="${{ secrets.FIREBASE_WEB_API_KEY }}" \
            --build-arg FIREBASE_WEB_APP_ID="${{ secrets.FIREBASE_WEB_APP_ID }}" \
            --build-arg FIREBASE_WEB_VAPID_KEY="${{ secrets.FIREBASE_WEB_VAPID_KEY }}" \
            --build-arg FIREBASE_WEB_PROJECT_ID="${{ secrets.FIREBASE_WEB_PROJECT_ID }}" \
            --build-arg FIREBASE_WEB_MESSAGING_SENDER_ID="${{ secrets.FIREBASE_WEB_MESSAGING_SENDER_ID }}" \
            --build-arg FIREBASE_WEB_STORAGE_BUCKET="${{ secrets.FIREBASE_WEB_STORAGE_BUCKET }}" \
            -t ${{ env.NGINX_IMAGE }} \
            .
          docker push ${{ env.NGINX_IMAGE }}

  build-payment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Yandex Cloud Container Registry
        uses: yc-actions/yc-cr-login@v2
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}

      - name: Build and push payment-service image
        # FIREBASE_SERVER_ACCOUNT_JSON is baked into the image as
        # /run/secrets/firebase-server-account.json (see Dockerfile.prod).
        # Empty value is tolerated: the runtime FCM init logs ERROR and
        # marks recovery push unavailable, but every other endpoint and
        # the bot's banner activate/deactivate flow keep working.
        #
        # The secret is piped via the `env:` block (NOT via `${{ … }}`
        # template substitution into the run-script). The JSON contains
        # raw quotes, parens, and embedded newlines; substituting it
        # inline produces a syntactically broken shell script (GitHub
        # Actions issue: "syntax error near unexpected token `('"). Using
        # an env var keeps the secret as opaque bytes for the shell and
        # for `--build-arg` parsing, and is the GitHub-recommended
        # pattern for secrets that may contain shell metacharacters.
        env:
          FIREBASE_SERVER_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVER_ACCOUNT_JSON }}
          PAYMENT_IMAGE: ${{ env.PAYMENT_IMAGE }}
        run: |
          docker build \
            -f payment-service/Dockerfile.prod \
            --build-arg "FIREBASE_SERVER_ACCOUNT_JSON=$FIREBASE_SERVER_ACCOUNT_JSON" \
            -t "$PAYMENT_IMAGE" \
            ./payment-service
          docker push "$PAYMENT_IMAGE"

  build-vpn:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Yandex Cloud Container Registry
        uses: yc-actions/yc-cr-login@v2
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}

      - name: Build and push StrongSwan VPN sidecar image
        # Built from `infra/strongswan/` (Dockerfile + entrypoint.sh +
        # ipsec.conf.template + ca.pem). The image carries no secrets
        # — EAP credentials are read at container start from env vars
        # (STRONGSWAN_EAP_USERNAME / STRONGSWAN_EAP_PASSWORD) injected
        # by `docker-compose.yc.yaml` from the workflow `env:` block.
        # See ADR-015.
        env:
          VPN_IMAGE: ${{ env.VPN_IMAGE }}
        run: |
          docker build \
            -f infra/strongswan/Dockerfile \
            -t "$VPN_IMAGE" \
            ./infra/strongswan
          docker push "$VPN_IMAGE"

  deploy:
    needs: [build-nginx, build-payment, build-vpn]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy COI VM
        uses: yc-actions/yc-coi-deploy@v2
        env:
          YC_VM_SSH: ${{ secrets.YC_VM_SSH }}
          YC_VM_USERNAME: ${{ secrets.YC_VM_USERNAME }}
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
          folder-id: ${{ secrets.YC_FOLDER_ID }}
          vm-name: ${{ secrets.YC_VM_NAME }}
          vm-service-account-id: ${{ secrets.YC_SERVICE_ACCOUNT_ID }}
          vm-cores: 2
          vm-memory: 4GB
          vm-core-fraction: 50
          vm-disk-type: network-hdd
          vm-disk-size: 20GB
          vm-zone-id: ru-central1-d
          vm-platform-id: standard-v3
          vm-subnet-id: ${{ secrets.YC_SUBNET_ID }}
          vm-public-ip: ${{ secrets.YC_VM_PUBLIC_IP }}
          user-data-path: './yandex-cloud/user-data.yaml'
          docker-compose-path: './yandex-cloud/docker-compose.yc.yaml'

  smoke:
    name: Post-deploy smoke
    needs: [deploy]
    runs-on: ubuntu-latest
    # Give the COI VM ~60s to settle (containers pull, nginx becomes ready,
    # SSL certs fetched from Yandex Certificate Manager).
    steps:
      - name: Wait for VM to be reachable
        run: sleep 60

      - name: Frontend smoke — homepage returns 200 with Expo bundle markers
        run: |
          set -euo pipefail
          response=$(curl -sf -o /tmp/index.html -w '%{http_code}' \
            https://transapp-dev.ru/)
          test "$response" = "200" || { echo "Expected 200, got $response"; exit 1; }
          # Sanity-check we got an Expo Web SPA, not a default nginx page or
          # a 404 disguised as 200.
          grep -q '<div id="root">' /tmp/index.html \
            || { echo "Homepage missing Expo root div"; exit 2; }
          echo "OK: Expo Web SPA served on https://transapp-dev.ru/"

      - name: Backend smoke — /payment-api/calculate-commission returns valid JSON
        run: |
          set -euo pipefail
          body=$(curl -sf -X POST \
            -H 'Content-Type: application/json' \
            -d '{"amount":500}' \
            https://transapp-dev.ru/payment-api/calculate-commission)
          echo "$body"
          # Spot-check expected fields exist (jq not installed by default;
          # use grep instead).
          echo "$body" | grep -q '"kazna_commission":' \
            || { echo "Missing kazna_commission in response"; exit 3; }
          echo "$body" | grep -q '"transapp_commission":' \
            || { echo "Missing transapp_commission in response"; exit 4; }
          echo "OK: payment-service reachable through nginx with valid response"

      - name: Liveness smoke — nginx /health returns 200
        run: |
          set -euo pipefail
          code=$(curl -sf -o /dev/null -w '%{http_code}' https://transapp-dev.ru/health)
          test "$code" = "200" || { echo "Expected 200, got $code"; exit 5; }
          echo "OK: nginx /health probe returns 200"

      - name: Regression smoke — old double-prefix path stays gone (404)
        run: |
          set -euo pipefail
          # The 2026-04-29 path-cleanup PR collapsed /payment-api/api/... → /payment-api/...
          # If this ever returns 200 again, the nginx proxy_pass regressed.
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST -H 'Content-Type: application/json' -d '{"amount":1}' \
            https://transapp-dev.ru/payment-api/api/calculate-commission)
          test "$code" = "404" || { echo "Old double-prefix path back from the dead, got $code"; exit 6; }
          echo "OK: legacy /payment-api/api/... correctly returns 404"

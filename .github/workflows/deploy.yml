name: Deploy Payment Service

on:
  push:
    branches: [ main, master ]
    paths:
      - 'payment-service/**'
      - '.github/workflows/deploy.yml'

env:
  IMAGE_NAME: transapp-payment-service
  CONTAINER_NAME: transapp-payment-service

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Yandex Cloud CR Login
      uses: yc-actions/yc-cr-login@v1
      with:
        yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}

    - name: Build, tag, and push image to Yandex Cloud Container Registry
      env:
        CR_REGISTRY: cr.yandex/${{ secrets.YC_REGISTRY_ID }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cd payment-service
        docker build -t $CR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG .
        docker push $CR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG
        docker tag $CR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG $CR_REGISTRY/$IMAGE_NAME:latest
        docker push $CR_REGISTRY/$IMAGE_NAME:latest

    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        envs: IMAGE_NAME,CONTAINER_NAME,CR_REGISTRY,IMAGE_TAG
        script: |
          # Pull new image
          docker pull cr.yandex/${{ secrets.YC_REGISTRY_ID }}/$IMAGE_NAME:latest
          
          # Stop and remove old container
          docker stop $CONTAINER_NAME || true
          docker rm $CONTAINER_NAME || true
          
          # Create .env file from secret
          echo "${{ secrets.ENV_FILE }}" > .env.payment
          
          # Run new container
          # Port 8001 mapped to internal 8000
          docker run -d \
            --name $CONTAINER_NAME \
            --restart always \
            -p 8001:8000 \
            --env-file .env.payment \
            cr.yandex/${{ secrets.YC_REGISTRY_ID }}/$IMAGE_NAME:latest
            
          # Run migrations
          # docker exec $CONTAINER_NAME aerich upgrade

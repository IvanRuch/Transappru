worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Main TransApp API (external, legacy perl backend owned by Ivan).
    # `transapp.ru` is the production apex (185.76.253.6). `keepalive 16`
    # lets nginx pool TLS connections to upstream, eliminating a fresh
    # handshake on every /api/* request (a few hundred ms saved per
    # request under load).
    #
    # NB: ivan.trans-konsalt.ru (185.76.253.4) is the STAGING vhost. From
    # 2026-05-14 until ADR-025 nginx was mistakenly pointed at it, which
    # routed every prod web user through Ivan's staging backend
    # (different vhost, smaller cache, larger spikes). See ADR-025.
    upstream main_api {
        server transapp.ru:443;
        keepalive 16;
    }

    # Payment service (local container)
    upstream payment_api {
        server payment-service:8000;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Default security headers (applied to responses without overriding
        # add_header in deeper location blocks).
        include /etc/nginx/security-headers.partial.conf;

        # Static assets — long cache (Expo adds content hash to filenames)
        location /static/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            include /etc/nginx/security-headers.partial.conf;
        }

        # Favicon set + PWA assets — long cache, no SPA fallback.
        location = /favicon.ico {
            expires 1y;
            add_header Cache-Control "public, immutable";
            include /etc/nginx/security-headers.partial.conf;
        }
        location ~ ^/(favicon-(?:16|32)|apple-touch-icon|icon-(?:192|512))\.png$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            include /etc/nginx/security-headers.partial.conf;
        }

        # PWA manifest — short cache, correct MIME type.
        location = /manifest.webmanifest {
            default_type application/manifest+json;
            add_header Cache-Control "public, max-age=3600";
            include /etc/nginx/security-headers.partial.conf;
        }

        # SEO files
        location = /robots.txt {
            default_type text/plain;
            add_header Cache-Control "public, max-age=3600";
            include /etc/nginx/security-headers.partial.conf;
        }

        # Firebase Cloud Messaging service worker — must be served from root
        # so its scope covers the whole app. No-cache so SW updates roll out
        # immediately on next page load. Service-Worker-Allowed: / is
        # cosmetic here (scope is already root) but explicit for clarity.
        location = /firebase-messaging-sw.js {
            default_type application/javascript;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Service-Worker-Allowed "/";
            include /etc/nginx/security-headers.partial.conf;
        }

        # Main TransApp API proxy.
        #
        # Targets the legacy prod-apex vhost (transapp.ru → 185.76.253.6),
        # same backend the mobile app talks to direct. Until 2026-05-20
        # this proxy_pass was pointed at ivan.trans-konsalt.ru
        # (185.76.253.4 — Ivan's STAGING vhost), so every prod web user
        # since the lk.transapp.ru cutover (2026-05-14, ADR-017) was
        # silently served from staging. See ADR-025 for full diagnosis
        # (response-size delta 36646 vs 36662 bytes, 19s+ spikes on
        # staging vs stable ~4.6s on prod-apex).
        #
        # `main_api` upstream + HTTP/1.1 + empty Connection header enable
        # the keepalive pool declared above.
        location /api/ {
            proxy_pass https://main_api/api/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_ssl_server_name on;
            proxy_ssl_name transapp.ru;
            proxy_set_header Host transapp.ru;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # Payment service API proxy.
        # Public shape: /payment-api/<endpoint>  →  upstream: /api/<endpoint>
        # Litestar PaymentController keeps its internal /api/ namespace;
        # nginx adds the prefix back when proxying. See ADR-008 + plan
        # 2026-04-29-payment-api-path-cleanup.md for rationale.
        location /payment-api/ {
            proxy_pass http://payment-service:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # Health check
        location /health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
            include /etc/nginx/security-headers.partial.conf;
        }

        # SPA fallback — all other routes serve index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Prevent caching of index.html so browsers always fetch fresh JS/CSS hashes
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
            include /etc/nginx/security-headers.partial.conf;
        }
    }
}

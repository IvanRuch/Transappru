worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Main TransApp API (external)
    upstream main_api {
        server ivan.trans-konsalt.ru:443;
    }

    # Payment service (local container)
    upstream payment_api {
        server payment-service:8000;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Default security headers (applied to responses without overriding
        # add_header in deeper location blocks).
        include /etc/nginx/security-headers.partial.conf;

        # Static assets — long cache (Expo adds content hash to filenames)
        location /static/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            include /etc/nginx/security-headers.partial.conf;
        }

        # Favicon set + PWA assets — long cache, no SPA fallback.
        location = /favicon.ico {
            expires 1y;
            add_header Cache-Control "public, immutable";
            include /etc/nginx/security-headers.partial.conf;
        }
        location ~ ^/(favicon-(?:16|32)|apple-touch-icon|icon-(?:192|512))\.png$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            include /etc/nginx/security-headers.partial.conf;
        }

        # PWA manifest — short cache, correct MIME type.
        location = /manifest.webmanifest {
            default_type application/manifest+json;
            add_header Cache-Control "public, max-age=3600";
            include /etc/nginx/security-headers.partial.conf;
        }

        # SEO files
        location = /robots.txt {
            default_type text/plain;
            add_header Cache-Control "public, max-age=3600";
            include /etc/nginx/security-headers.partial.conf;
        }

        # Main TransApp API proxy
        location /api/ {
            proxy_pass https://ivan.trans-konsalt.ru/api/;
            proxy_ssl_server_name on;
            proxy_set_header Host ivan.trans-konsalt.ru;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # Payment service API proxy.
        # Public shape: /payment-api/<endpoint>  →  upstream: /api/<endpoint>
        # Litestar PaymentController keeps its internal /api/ namespace;
        # nginx adds the prefix back when proxying. See ADR-008 + plan
        # 2026-04-29-payment-api-path-cleanup.md for rationale.
        location /payment-api/ {
            proxy_pass http://payment-service:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # Health check
        location /health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
            include /etc/nginx/security-headers.partial.conf;
        }

        # SPA fallback — all other routes serve index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Prevent caching of index.html so browsers always fetch fresh JS/CSS hashes
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
            include /etc/nginx/security-headers.partial.conf;
        }
    }
}

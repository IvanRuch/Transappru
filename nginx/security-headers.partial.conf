# Security headers — included into every location that owns its own
# `add_header` directives, because nginx does NOT inherit add_header across
# nested blocks (a child block with even a single add_header silently drops
# all parent add_header). Keeping the set in one file avoids drift.
#
# `always` flag — applies the header to error responses (4xx/5xx) too.

add_header X-Frame-Options              "SAMEORIGIN"                       always;
add_header X-Content-Type-Options       "nosniff"                          always;
add_header Referrer-Policy              "strict-origin-when-cross-origin"  always;
add_header Permissions-Policy           "geolocation=(), microphone=(), camera=(), payment=(self)" always;
# CSP additions for FCM web push:
#   script-src https://www.gstatic.com — service worker imports the
#       Firebase compat SDK from gstatic CDN (firebase-app-compat.js,
#       firebase-messaging-compat.js).
#   connect-src https://*.googleapis.com domains — token registration,
#       message delivery, installations service.
#   worker-src 'self' — explicit allow of the service worker we serve.
add_header Content-Security-Policy      "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://ivan.trans-konsalt.ru https://transapp-dev.ru https://*.maps.yandex.net https://api-maps.yandex.ru https://demopay.oplatagosuslug.ru https://fcmregistrations.googleapis.com https://fcm.googleapis.com https://firebaseinstallations.googleapis.com wss:; frame-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; worker-src 'self'" always;

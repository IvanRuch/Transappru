services:
  payment-db:
    image: postgres:15-alpine
    container_name: transapp_payment_db
    restart: always
    environment:
      POSTGRES_USER: {{ env.PG_USER }}
      POSTGRES_PASSWORD: {{ env.PG_PASSWORD }}
      POSTGRES_DB: {{ env.PG_NAME }}
    volumes:
      - pg_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-service:
    image: {{ env.PAYMENT_IMAGE }}
    container_name: transapp_payment
    environment:
      DB_URL: postgres://{{ env.PG_USER }}:{{ env.PG_PASSWORD }}@payment-db:5432/{{ env.PG_NAME }}
      KAZNA_API_URL: {{ env.KAZNA_API_URL }}
      KAZNA_SECRET_KEY: {{ env.KAZNA_SECRET_KEY }}
      KAZNA_TOKEN: {{ env.KAZNA_TOKEN }}
      # Data quality monitoring (ADR-012). payment-service does NOT
      # send admin alerts directly — Telegram is unreachable from RU
      # IPs, and wrapping this container in the VPN would break Kazna
      # outbound (RU). The bot sidecar polls `data_issues` and owns
      # all outbound TG traffic via its split-tunnel namespace
      # (ADR-015). FCM (Firebase) is fine through the default route —
      # not RU-blocked.
      FIREBASE_CREDENTIALS_PATH: /run/secrets/firebase-server-account.json
    expose:
      - "8000"
    depends_on:
      payment-db:
        condition: service_healthy
    restart: always

  # StrongSwan IPsec client (ADR-015). Owns the network namespace for
  # outbound traffic to api.telegram.org. Split-tunnel: only Telegram
  # CIDRs (149.154.160.0/20, 91.108.4.0/22) are routed through the
  # upstream VPN; everything else uses the host default route, so
  # payment-bot can still reach payment-db over the default Docker
  # bridge while sharing this namespace.
  vpn:
    image: {{ env.VPN_IMAGE }}
    container_name: transapp_vpn
    cap_add:
      - NET_ADMIN
    sysctls:
      # IKE/UDP encapsulation needs IP forwarding off (default-off);
      # explicit here to make the requirement self-documenting.
      net.ipv4.ip_forward: "0"
    environment:
      EAP_USERNAME: "{{ env.STRONGSWAN_EAP_USERNAME }}"
      EAP_PASSWORD: "{{ env.STRONGSWAN_EAP_PASSWORD }}"
    restart: unless-stopped

  # Sidecar bot worker — same image as payment-service, different
  # entrypoint. Owns the aiogram dispatcher (admin commands + inline
  # callbacks + recovery-push fan-out at /banner_off) AND the
  # `data_issues` poll-loop that dispatches admin alerts on new
  # complaints (see ADR-015 — payment-service is RU-bound and cannot
  # reach Telegram, so the bot is the single TG egress point).
  #
  # `network_mode: "service:vpn"` puts payment-bot in the VPN
  # namespace. payment-db is reachable via the default route through
  # the vpn container's eth0 — same Docker bridge network. Telegram
  # CIDRs go through the IPsec tunnel.
  payment-bot:
    image: {{ env.PAYMENT_IMAGE }}
    container_name: transapp_payment_bot
    network_mode: "service:vpn"
    environment:
      DB_URL: postgres://{{ env.PG_USER }}:{{ env.PG_PASSWORD }}@payment-db:5432/{{ env.PG_NAME }}
      TELEGRAM_BOT_TOKEN: "{{ env.TELEGRAM_BOT_TOKEN }}"
      TELEGRAM_ADMIN_CHAT_ID: "{{ env.TELEGRAM_ADMIN_CHAT_ID }}"
      FIREBASE_CREDENTIALS_PATH: /run/secrets/firebase-server-account.json
    command: ["python", "-m", "app.bot.bot_worker"]
    depends_on:
      vpn:
        condition: service_started
      payment-db:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: {{ env.NGINX_IMAGE }}
    container_name: transapp_nginx
    environment:
      YC_CERT_ID: {{ env.YC_CERT_ID }}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - payment-service
    restart: always

volumes:
  pg_data:
